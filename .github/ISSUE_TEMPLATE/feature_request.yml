name: Feature request
description: Propose a CLI, integration, docs, or workflow improvement
title: "feature: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Keep the request focused on the user workflow. Avoid pasting private writing samples.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [cli, skill, benchmark, docs, integration, distribution, other]
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard, confusing, slow, or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest behavior or documentation change that would help.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or simpler variants.
    validations:
      required: false
