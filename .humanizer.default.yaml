version: "3.1.0"
language: ko              # Korean (default) -- auto-loads all ko-*.md patterns
                          # language: en      -- English -- auto-loads all en-*.md patterns
                          # Override with CLI: --lang en
profile: default
output: rewrite           # rewrite | diff | audit | score

# Supported languages: ko, en

# patterns 목록은 기본 언어(ko)의 팩을 문서화합니다.
# 실제 로딩은 Glob patterns/{lang}-*.md로 자동 탐색합니다.
# 특정 팩을 제외하려면 skip-patterns를 사용하세요.
patterns:
  - ko-structure
  - ko-content
  - ko-language
  - ko-style
  - ko-communication
  - ko-filler

# English packs (auto-discovered when language: en):
#   - en-structure (placeholder, 0 patterns)
#   - en-content
#   - en-language
#   - en-style
#   - en-communication
#   - en-filler

skip-patterns: []
blocklist: []              # 추가로 감지할 어휘
allowlist: []              # 감지에서 제외할 어휘

# MAX mode: multi-model humanization
# claude uses `claude -p`, gemini uses `gemini -p`, codex uses `codex exec`
# Supported models: claude, codex, gemini
# Override with CLI: --models claude,gemini,codex
max-models:
  - claude
  - gemini

# Dispatch mode for MAX mode CLI execution
# omc: tmux pane parallel dispatch (recommended, requires oh-my-claudecode + tmux)
#       - Handles long prompts via stdin pipe (no ARG_MAX limit)
#       - Visual feedback in separate tmux panes
#       - Gemini stderr issue handled automatically
# direct: sequential stdin pipe (no external dependency, fallback)
dispatch: omc
