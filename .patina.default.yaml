version: "6.3.0"
language: ko              # Korean (default) -- auto-loads all ko-*.md patterns
                          # language: en      -- English -- auto-loads all en-*.md patterns
                          # language: zh      -- Chinese -- auto-loads all zh-*.md patterns
                          # language: ja      -- Japanese -- auto-loads all ja-*.md patterns
                          # Override with CLI: --lang en / --lang zh / --lang ja
profile: default
output: rewrite           # rewrite | diff | audit | score

# Opt-in: request OpenAI-compatible structured output (response_format
# json_object) for ouroboros LLM scoring. Default false; only the openai-http
# backend forwards it (never sent to local CLI backends). Some OpenAI-compatible
# endpoints reject response_format — leave false unless your endpoint supports it.
structured-output: false

# Tone categorization (v3.10): register axis (casual/professional) for ko/en.
# Resolution: explicit --tone > config tone > config profile.
# auto = heuristic single-tone detection at SKILL.md Phase 4.5b.
# Unset = profile-only legacy behavior (regression-safe default).
tone:                       # one of: casual, professional, auto (register only)
                            # Override with CLI: --tone <name>
                            # zh/ja with explicit tone: warns and falls back to profile.

# Persona harness (v1): Korean rewrite defaults to the conservative preserve
# persona. Non-rewrite and non-Korean surfaces do not apply persona implicitly.
persona: preserve
personas:
  library: personas/ko
  thresholds:
    schema: patina.persona.thresholds.v1
    # source stays `placeholder` because the advisory tuning below is informed by
    # observation, not a formal 2-round promotion. The ENFORCING floors, however,
    # are the product's core safety contract and do not depend on calibration.
    source: placeholder
    calibration_rounds_required: 2
    # --- ENFORCING (safety gate; a miss sets a non-zero exit, non-destructive) ---
    # Meaning + facts only. Enforced when evaluated (mps/fidelity need --verify or a
    # backend-reported score); dropped source numbers always enforce deterministically.
    mps_floor: 70
    fidelity_floor: 70
    # --- ADVISORY (warn only; never blocks or changes the exit code) ---
    # persona_match: voice-quality signal. Observed real KO persona-match runs ~35-56,
    # so 45 flags the low end without firing on every rewrite.
    persona_match_min: 45
    # churn: surface token change, NOT a meaning signal. Live KO humanizing rewrites
    # churn ~0.5-0.85 while preserving meaning, so 0.9 flags only near-total rewrites.
    churn_max: 0.9

# Supported languages: ko, en, zh, ja

# patterns 목록은 기본 언어(ko)의 팩을 문서화합니다.
# 실제 로딩은 Glob patterns/{lang}-*.md로 자동 탐색합니다.
# 특정 팩을 제외하려면 skip-patterns를 사용하세요.
patterns:
  - ko-structure
  - ko-content
  - ko-language
  - ko-style
  - ko-communication
  - ko-filler
  - ko-viral-hook    # score-only — detection without rewrite

# English packs (auto-discovered when language: en):
#   - en-structure (5 patterns: #25-28, #30)
#   - en-content
#   - en-language
#   - en-style
#   - en-communication
#   - en-filler (4 patterns: #22-24, #31)

# Chinese packs (auto-discovered when language: zh):
#   - zh-structure (5 patterns: #25-28, #30)
#   - zh-content
#   - zh-language
#   - zh-style
#   - zh-communication
#   - zh-filler (4 patterns: #22-24, #31)

# Japanese packs (auto-discovered when language: ja):
#   - ja-structure (5 patterns: #25-28, #30)
#   - ja-content
#   - ja-language
#   - ja-style
#   - ja-communication
#   - ja-filler (4 patterns: #22-24, #31)

skip-patterns: []          # additive merge across default/global/project configs
blocklist: []              # additive merge: 추가로 감지할 어휘
allowlist: []              # additive merge: 감지에서 제외할 어휘
# Other arrays are replaced by the higher-precedence config so users can choose
# an exact value instead of merging by accident.

# Scoring: LLM score remains canonical, with a deterministic shadow score
# from src/features/* for reproducible drift checks.
scoring:
  deterministic:
    enabled: true
    divergence-threshold: 20  # warn and prefer the more pessimistic score above this delta
    combined-weight: 0        # default off for combinedScore; users may opt in (e.g. 0.2)

# Ouroboros: iterative self-improvement loop
# Runs the full humanization pipeline repeatedly until the AI score converges.
# Enable via config or CLI flag: --ouroboros
ouroboros:
  enabled: false            # opt-in; --ouroboros CLI flag overrides to true
  target-score: 30          # stop when overall score <= this value (0-100)
  max-iterations: 3         # hard limit on loop iterations
  plateau-threshold: 10     # stop if score improves by less than this between iterations
  category-weights:
    ko:
      content: 0.18
      language: 0.18
      style: 0.18
      communication: 0.13
      filler: 0.08
      structure: 0.15
      viral-hook: 0.10  # score-only pack (excluded from rewrite)
    en:
      content: 0.20
      language: 0.20
      style: 0.20
      communication: 0.12
      filler: 0.08
      structure: 0.10
      viral-hook: 0.10  # score-only pack (excluded from rewrite)
    zh:
      content: 0.18
      language: 0.18
      style: 0.18
      communication: 0.13
      filler: 0.08
      structure: 0.15
      viral-hook: 0.10  # score-only pack (excluded from rewrite)
    ja:
      content: 0.18
      language: 0.18
      style: 0.18
      communication: 0.13
      filler: 0.08
      structure: 0.15
      viral-hook: 0.10  # score-only pack (excluded from rewrite)
  fidelity-floor: 70             # stop ouroboros if fidelity drops below this; also the --verify fidelity floor
  mps-floor: 70                  # stop ouroboros if MPS (meaning preservation) drops below this; also the --verify MPS floor
  combined-weights:
    default:
      ai-likeness: 0.60
      fidelity: 0.40
    academic:
      ai-likeness: 0.40
      fidelity: 0.60
    blog:
      ai-likeness: 0.70
      fidelity: 0.30
    technical:
      ai-likeness: 0.35
      fidelity: 0.65
    social:
      ai-likeness: 0.75
      fidelity: 0.25
    email:
      ai-likeness: 0.50
      fidelity: 0.50
    legal:
      ai-likeness: 0.35
      fidelity: 0.65
    medical:
      ai-likeness: 0.35
      fidelity: 0.65
    marketing:
      ai-likeness: 0.65
      fidelity: 0.35
    namuwiki:
      ai-likeness: 0.65
      fidelity: 0.35
  severity-points:
    high: 3
    medium: 2
    low: 1

# Stylometry: deterministic statistical preprocessing (SKILL.md Step 4.6)
# Calculates burstiness (sentence-length CV) and MATTR (lexical diversity) per
# paragraph, marks suspect zones, and feeds them into 5a/5b as internal memory.
# See core/stylometry.md for the full algorithm reference.
stylometry:
  enabled: true              # set false to bypass 4.6단계 entirely
  languages: [ko, en, zh, ja] # zh/ja use deterministic character-token fallback
  # Optional private local structural classifier. Public releases ship the
  # loader and feature extractor only; trained model files stay outside git/npm.
  # You can also set PATINA_STRUCTURAL_MODEL=/path/to/model-ko.json.
  # structural_model:
  #   path: .patina/models/model-ko.json
  burstiness:
    bands:
      low: 0.30              # CV < 0.30 → low (suspect). Calibrated v3.5.1 from
                             # 0.25 against 300 external paragraphs (HC3 + Wikipedia).
      high: 0.50             # CV > 0.50 → high
  ttr:
    window: 50               # MATTR window in tokens
    bands:
      low: 0.55              # MATTR < 0.55 → low (suspect)
      high: 0.70             # MATTR > 0.70 → high
  sentence_zoom:
    similarity_threshold: 0.20  # adjacent sentences within ±20% token count → grouped as sub-flag
  ko_diagnostics:
    enabled: true              # conservative ko-only composite; requires all bands below
    bands:
      minSentences: 4
      minEojeols: 20
      spacing:
        maxEojeolLengthCV: 0.38
      comma:
        maxPerSentence: 1
      posProxy:
        minMatchedCount: 10
        maxClassDiversity: 0.26
    spacing:
      metric: eojeol_length_cv # dependency-free Korean spacing regularity proxy
    comma:
      metric: per_sentence_and_per_100_chars
    pos_proxy:
      metric: suffix_class_diversity
      dependency: none         # no runtime morphology analyzer
  skip:
    min_paragraphs: 2
    min_sentences: 2

# AI-Lexicon Overlap (SKILL.md Step 4.7)
# Matches paragraphs against an AI-favored phrase dictionary not covered
# by the 28-pattern catalog. Computes density per 1000 tokens; high
# density paragraphs are flagged SUSPECT under the 3-signal OR rule
# (burstiness OR MATTR OR lexicon_density).
# See core/stylometry.md §16 for the full algorithm.
lexicon:
  enabled: true
  languages: [en, ko, zh, ja]
  density_threshold: 3.0     # matches per 1000 tokens; > threshold → SUSPECT
  # Lexicon files auto-discovered via Glob lexicon/ai-{lang}.md.
  # en/ko use the calibrated baseline from HC3 + Wikipedia + NamuWiki:
  # AI catch 66% → 76% with Wikipedia FP staying at 25% boundary.
  # zh/ja are starter, local-gate lexicons; expand only after a larger corpus pass.
  skip:
    min_paragraphs: 2
    min_sentences: 2
