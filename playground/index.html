<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>patina — AI 글 자연스럽게 다듬기</title>
  <meta name="description" content="patina humanizer chat — AI 티 나는 문장을 의미·숫자·톤 그대로 자연스럽게 다듬습니다." />
  <link rel="stylesheet" href="/chatgpt.css" />
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__top">
        <button class="newchat" id="new-chat" type="button">
          <span class="newchat__icon" aria-hidden="true">+</span>
          <span>새 대화</span>
        </button>
      </div>
      <nav class="sidebar__history" id="history" aria-label="대화 목록"></nav>
      <div class="sidebar__foot">
        <div class="brandmark"><span class="brandmark__dot">p</span> patina</div>
        <div class="sidebar__note">의미·숫자·톤을 바꾸지 않는<br />결정론적 휴머나이저</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="iconbtn topbar__menu" id="toggle-sidebar" type="button" aria-label="사이드바 토글">☰</button>
        <div class="topbar__title">patina</div>
        <div class="topbar__controls">
          <label class="ctl">
            <span class="ctl__label">언어</span>
            <select id="lang" class="ctl__select">
              <option value="ko">한국어</option>
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="ja">日本語</option>
            </select>
          </label>
          <label class="ctl">
            <span class="ctl__label">모드</span>
            <select id="tier" class="ctl__select">
              <option value="free">Free</option>
              <option value="byok">BYOK</option>
            </select>
          </label>
          <label class="ctl ctl--byok" id="provider-ctl" hidden>
            <span class="ctl__label">Provider</span>
            <select id="provider" class="ctl__select"></select>
          </label>
          <label class="ctl ctl--byok" id="model-ctl" hidden>
            <span class="ctl__label">Model</span>
            <select id="model" class="ctl__select"></select>
          </label>
          <label class="ctl ctl--byok ctl--key" id="key-ctl" hidden>
            <span class="ctl__label">API key</span>
            <input id="api-key" class="ctl__input" type="password" autocomplete="off" placeholder="sk-… (브라우저에만 보관)" />
          </label>
        </div>
      </header>

      <div class="thread" id="thread">
        <section class="empty" id="empty">
          <div class="empty__logo">p</div>
          <h1 class="empty__title">무엇을 다듬어 드릴까요?</h1>
          <p class="empty__sub">AI 티 나는 문장을 붙여넣으면 patina가 의미·숫자·톤은 그대로 두고 자연스럽게 고쳐드려요.</p>
          <div class="chips" id="chips"></div>
        </section>
      </div>

      <div class="composer-wrap">
        <form class="composer" id="composer">
          <textarea id="input" class="composer__input" rows="1" placeholder="다듬고 싶은 문장을 붙여넣기… (Enter 전송 · Shift+Enter 줄바꿈)" autofocus></textarea>
          <button class="composer__send" id="send" type="submit" aria-label="전송" disabled>
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 4l-7 7h4v7h6v-7h4z"/></svg>
          </button>
        </form>
        <p class="composer__hint" id="hint">patina는 주장·수치·인과를 바꾸지 않고 표현만 다듬습니다. 데모 환경에서는 로컬 CLI로 실제 리라이트하며 MPS/fidelity는 프리뷰 값입니다.</p>
      </div>
    </main>
  </div>

  <script type="module" src="/chatgpt.js"></script>
</body>
</html>
